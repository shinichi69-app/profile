<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinichi - Tactical Portfolio Console</title>
    
    <!-- การนำเข้า Fonts สไตล์ Technical & Modern จาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- 🎨 Monochrome Tactical Variables (Visitor Mode) --- */
        :root {
            --bg-base: #0a0a0a;          
            --bg-surface: #121212;       
            --bg-surface-hover: #1a1a1a; 
            --border-subtle: #262626;    
            --border-active: #ffffff;    
            --text-pure: #ffffff;        
            --text-muted: #737373;       
            --text-ghost: #404040;       
            --accent-premium: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.01);
            --glow-premium: transparent;
            
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition-tactical: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- ✨ 👑 PREMIUM THEME VARIABLES (When logged in as Owner) --- */
        body.owner-mode {
            --bg-base: #050505;
            --bg-surface: rgba(26, 22, 16, 0.7); /* ผิวกระจกโทนอุ่นหรูหรา */
            --bg-surface-hover: rgba(38, 32, 23, 0.9);
            --border-subtle: #4a3b2c;            /* เส้นขอบทองแดงหม่น */
            --border-active: #cda250;            /* ทองคำระดับพรีเมี่ยม */
            --text-pure: #f5eedc;
            --text-muted: #a69276;
            --text-ghost: #614e3b;
            --accent-premium: #cda250;           /* สีทองประกายเอกสิทธิ์ */
            --grid-color: rgba(205, 162, 80, 0.02); 
            --glow-premium: 0 0 30px rgba(205, 162, 80, 0.15); 
        }

        /* --- 🌐 Global Reset & Base Layout --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-pure);
            font-family: var(--font-sans);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: background-color 0.8s ease, background-image 0.8s ease;
        }

        /* 🕒 สไตล์สำหรับนาฬิกา Real-time มุมขวาบน */
        .tactical-clock {
            position: fixed;
            top: 20px;
            right: 24px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-pure);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 8px 16px;
            border-radius: 4px;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            transition: var(--transition-tactical);
        }

        .tactical-clock::before {
            content: "SYS_TIME //";
            color: var(--text-muted);
            font-weight: 600;
        }

        .tactical-clock:hover {
            border-color: var(--border-active);
            background-color: var(--bg-surface-hover);
        }

        /* 📱 🦾 ปุ่มลอยตัวสไตล์ iPhone AssistiveTouch */
        .assistive-touch-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: move; 
            z-index: 9999;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s, background-color 0.3s, transform 0.1s;
            touch-action: none; 
        }

        .assistive-touch-btn::before {
            content: "";
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.3);
            transition: var(--transition-tactical);
        }

        body.owner-mode .assistive-touch-btn {
            background: rgba(205, 162, 80, 0.15);
            border-color: rgba(205, 162, 80, 0.5);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.7), 0 0 15px rgba(205, 162, 80, 0.3);
        }
        body.owner-mode .assistive-touch-btn::before {
            background: var(--accent-premium);
        }

        .assistive-touch-btn:active {
            transform: scale(0.92);
        }

        /* 🪟 🔐 Tactical Login Modal Layout */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .tactical-modal {
            background: #0f0f0f;
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            width: 100%;
            max-width: 420px;
            padding: 32px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            transform: scale(0.95);
            transition: var(--transition-tactical);
        }

        .modal-overlay.open .tactical-modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px dashed var(--border-subtle);
            padding-bottom: 12px;
        }

        .modal-header h3 {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            color: var(--accent-premium);
        }

        .btn-close-modal {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-mono);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-close-modal:hover { color: #ff4a4a; }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            background: #161616;
            border: 1px solid var(--border-subtle);
            padding: 12px;
            border-radius: 4px;
            color: var(--text-pure);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: var(--transition-tactical);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--border-active);
            background: #1c1c1c;
        }

        .form-control.code-font {
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
        }

        .forgot-link-wrap {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 20px;
        }
        .btn-forgot-trigger {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            cursor: pointer;
            text-decoration: underline;
        }
        .btn-forgot-trigger:hover { color: var(--border-active); }

        .forgot-panel {
            background: #161310;
            border: 1px dashed #614e3b;
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none; 
        }

        .generated-code-box {
            background: #000;
            border: 1px solid var(--border-subtle);
            padding: 10px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: bold;
            color: #cda250;
            letter-spacing: 0.2em;
            margin: 8px 0 14px 0;
            border-radius: 4px;
        }

        .btn-submit-login {
            width: 100%;
            padding: 14px;
            background: var(--text-pure);
            color: var(--bg-base);
            border: 1px solid var(--text-pure);
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition-tactical);
        }
        .btn-submit-login:hover {
            background: transparent;
            color: var(--text-pure);
            border-color: var(--border-active);
        }

        body.owner-mode .btn-submit-login {
            background: var(--accent-premium);
            color: #000;
            border-color: var(--accent-premium);
        }
        body.owner-mode .btn-submit-login:hover {
            background: transparent;
            color: var(--accent-premium);
        }

        /* 🚨 ปุ่มออกจากระบบสไตล์ Tactical Alert */
        .btn-logout {
            display: none; /* ซ่อนไว้ก่อนในโหมดปกติ */
            background: transparent;
            color: #ff5555;
            border: 1px solid rgba(255, 85, 85, 0.4);
            padding: 6px 14px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition-tactical);
            margin-top: 12px;
            letter-spacing: 0.05em;
        }
        .btn-logout:hover {
            background: #ff5555;
            color: #ffffff;
            border-color: #ff5555;
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.3);
        }
        /* จะแสดงผลออกมาเฉพาะตอนเปิด Owner Mode เท่านั้น */
        body.owner-mode .btn-logout {
            display: inline-block;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 80px 24px 60px 24px; 
            position: relative;
        }

        /* --- 🎭 SPA View Management --- */
        .view-container {
            transition: var(--transition-tactical);
            opacity: 1;
            transform: translateY(0);
        }

        .view-container.hidden {
            display: none;
            opacity: 0;
            transform: translateY(20px);
        }

        /* --- 🦸‍♂️ View 1: Home/Hero Section --- */
        .hero-section {
            position: relative;
            text-align: left;
            padding-bottom: 48px;
            border-bottom: 1px dashed var(--border-subtle);
            margin-bottom: 40px;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .hero-avatar {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
            padding: 4px;
            background-color: var(--bg-surface);
            object-fit: cover;
            transition: var(--transition-tactical);
        }
        body.owner-mode .hero-avatar {
            border-color: var(--border-active);
            box-shadow: 0 0 15px rgba(205, 162, 80, 0.3);
        }

        .hero-section h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            text-transform: uppercase;
            transition: color 0.5s ease;
        }
        body.owner-mode .hero-section h1 {
            color: var(--accent-premium);
            text-shadow: 0 0 20px rgba(205, 162, 80, 0.2);
        }

        .hero-section h2 {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* --- 🧩 Reusable Card --- */
        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            padding: 28px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: var(--glow-premium);
            transition: var(--transition-tactical), box-shadow 0.8s ease;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            border-color: var(--border-active);
            background-color: var(--bg-surface-hover);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '■';
            font-size: 0.7rem;
            color: var(--accent-premium);
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--text-pure);
            color: var(--bg-base);
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid var(--text-pure);
            cursor: pointer;
            transition: var(--transition-tactical);
        }

        .btn-primary:hover {
            background-color: transparent;
            color: var(--text-pure);
            border-color: var(--border-active);
        }

        body.owner-mode .btn-primary {
            background-color: var(--accent-premium);
            color: #000;
            border-color: var(--accent-premium);
        }
        body.owner-mode .btn-primary:hover {
            background-color: transparent;
            color: var(--accent-premium);
        }

        /* --- 🎛️ View 2: Works Terminal Section --- */
        .works-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px dashed var(--border-subtle);
            margin-bottom: 32px;
        }

        .works-header h2 {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .btn-back {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-subtle);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            transition: var(--transition-tactical);
        }

        .btn-back:hover {
            color: var(--text-pure);
            border-color: var(--border-active);
        }

        .tactical-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        @media (min-width: 600px) {
            .tactical-grid {
                grid-template-columns: repeat(2, 1fr); 
            }
            .full-width-btn {
                grid-column: span 2; 
            }
        }

        .btn-tactical {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-pure);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            padding: 20px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            transition: var(--transition-tactical);
            display: flex;
            flex-direction: column;
            gap: 4px;
            backdrop-filter: blur(10px);
        }

        .btn-tactical span.num {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .btn-tactical span.label {
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .btn-tactical:hover, .btn-tactical.active {
            border-color: var(--border-active);
            background-color: var(--bg-surface-hover);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.02);
        }

        body.owner-mode .btn-tactical.active {
            box-shadow: 0 0 15px rgba(205, 162, 80, 0.15);
        }

        .display-panel {
            background-color: rgba(5, 5, 5, 0.8);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            padding: 24px;
            min-height: 150px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            position: relative;
            box-shadow: var(--glow-premium);
            transition: box-shadow 0.8s ease;
        }

        .display-panel::before {
            content: "CONSOLE_OUTPUT";
            font-size: 0.7rem;
            color: var(--text-ghost);
            position: absolute;
            top: 8px; right: 12px;
        }

        .panel-content {
            color: var(--text-muted);
            white-space: pre-line; 
        }
    </style>
</head>
<body>

    <!-- 🕒 นาฬิกาแบบเรียลไทม์ -->
    <div id="sys-clock" class="tactical-clock">LOADING...</div>

    <!-- 📱 🦾 ปุ่มลอยตัวสไตล์ iPhone AssistiveTouch -->
    <div id="assistive-btn" class="assistive-touch-btn"></div>

    <!-- 🪟 🔐 หน้าต่างล็อกอิน (Modal Screen) -->
    <div id="login-modal" class="modal-overlay">
        <div class="tactical-modal">
            <div class="modal-header">
                <h3 id="modal-title">// OWNER AUTHENTICATION</h3>
                <button class="btn-close-modal" onclick="toggleModal(false)">[ X ]</button>
            </div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" class="form-control" required placeholder="owner@domain.com">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-user" class="form-control" required placeholder="shinichi_admin">
                </div>
                
                <!-- ช่องกรอกรหัสผ่านหลัก -->
                <div class="form-group" id="old-pass-group">
                    <label>Password (8 Characters)</label>
                    <input type="password" id="login-pass" class="form-control code-font" required maxlength="8" placeholder="********">
                </div>

                <div class="forgot-link-wrap">
                    <button type="button" class="btn-forgot-trigger" onclick="toggleForgotPanel(true)">Forgot Password?</button>
                </div>

                <!-- แผงหน้าต่างลืมรหัสผ่าน -->
                <div id="forgot-panel" class="forgot-panel">
                    <label style="display:block; font-family:var(--font-mono); font-size:0.7rem; color:#cda250;">[ SECURITY ALERT: CODE GENERATED ]</label>
                    <div id="generated-code" class="generated-code-box">000000</div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Setup New 8-Digit Password</label>
                        <input type="password" id="new-pass" class="form-control code-font" maxlength="8" placeholder="New Password">
                    </div>
                </div>

                <button type="submit" class="btn-submit-login">EXECUTE ACCESS</button>
            </form>
        </div>
    </div>

    <!-- MAIN VIEW CONTAINER -->
    <div class="container">
        
        <!-- ================= VIEW 1: HOME PANEL ================= -->
        <div id="view-home" class="view-container">
            <header class="hero-section">
                <div class="avatar-wrapper">
                    <img src="my-profile.jpg" alt="Shinichi" class="hero-avatar">
                </div>
                <h1>SHINICHI</h1>
                <h2 id="role-tag">[ SUPPORTER ]</h2>
                <!-- 🚨 ปุ่มออกจากระบบที่จะปรากฏขึ้นเฉพาะตอนล็อกอินแล้ว -->
                <button class="btn-logout" onclick="handleLogout()">[ DEACTIVATE OWNER MODE ]</button>
            </header>

            <main class="card">
                <h3 class="card-title">Wellcome to อะไรก็ไม่รู้เว็บไซต์</h3>
                <p>เว็บไซต์นี้จัดทำขึ้นเพื่อประโยชน์ต่อบุคคลที่ผ่านมา และกำลังมองหาสิ่งที่ขาดหาย โดยเว็บไซต์นี้ก็ไม่คิดว่าจะมีเหมือนกัน แฮร่</p>
                <button class="btn-primary" onclick="switchView('view-works')">VIEW</button>
            </main>
        </div>

        <!-- ================= VIEW 2: WORKS TERMINAL ================= -->
        <div id="view-works" class="view-container hidden">
            <header class="works-header">
                <h2>// Job description</h2>
                <button class="btn-back" onclick="switchView('view-home')">[ RETURN ]</button>
            </header>

            <section class="tactical-grid">
                <button class="btn-tactical active" onclick="filterWork(1, this)">
                    <span class="num">MG UBONRATCHATHANI // 01</span>
                    <span class="label">MG MASTER</span>
                </button>
                <button class="btn-tactical" onclick="filterWork(2, this)">
                    <span class="num">MG UBONRATCHATHANI // 02</span>
                    <span class="label">MARKETING</span>
                </button>
                <button class="btn-tactical" onclick="filterWork(3, this)">
                    <span class="num">MG UBONRATCHATHANI // 03</span>
                    <span class="label">IT SUPPORT</span>
                </button>
                <button class="btn-tactical" onclick="filterWork(4, this)">
                    <span class="num">MG UBONRATCHATHANI // 04</span>
                    <span class="label">ADMIN / Stock</span>
                </button>
                <button class="btn-tactical full-width-btn" onclick="filterWork(5, this)">
                    <span class="num">MG UBONRATCHATHANI // 05</span>
                    <span class="label">Developer </span>
                </button>
            </section>
            
            <section class="display-panel">
                <div id="panel-text" class="panel-content">
                    > โปรดเลือกคลิกสักปุ่มเถอะ...
                </div>
            </section>
        </div>

    </div>

    <!-- --- ⚙️ Pure Logic (JavaScript) --- -->
    <script>
        // 🔑 1. ระบบดึงรหัสผ่านปัจจุบันจากหน่วยความจำเบราว์เซอร์ (ถ้าเปิดเว็บครั้งแรกจะใช้ 'pop11013' เป็นค่าเริ่มต้นค่ะ)
        let currentOwnerPassword = localStorage.getItem('ownerPassword') || 'pop11013';

        // 💾 2. ฟังก์ชันตรวจสอบสถานะล็อกอินค้างไว้ (ทำงานทันทีที่โหลดหน้าจอเสร็จเพื่อป้องกันการกลับไปหน้า Supporter)
        function checkPersistedLogin() {
            const isOwnerLoggedIn = localStorage.getItem('ownerLoggedIn');
            if (isOwnerLoggedIn === 'true') {
                document.body.classList.add('owner-mode');
                document.getElementById('role-tag').innerText = '[ OWNER / DEVELOPER ]';
            }
        }

        // 3. ระบบจัดการเปลี่ยนมุมมองหน้าจอแบบ SPA Smooth Transition
        function switchView(targetViewId) {
            const currentActive = document.querySelector('.view-container:not(.hidden)');
            const targetView = document.getElementById(targetViewId);
            
            if (currentActive) {
                currentActive.style.opacity = '0';
                currentActive.style.transform = 'translateY(-10px)';
                
                setTimeout(() => {
                    currentActive.classList.add('hidden');
                    targetView.classList.remove('hidden');
                    targetView.style.opacity = '0';
                    targetView.style.transform = 'translateY(10px)';
                    
                    setTimeout(() => {
                        targetView.style.opacity = '1';
                        targetView.style.transform = 'translateY(0)';
                    }, 50);
                }, 300);
            }
        }

        // 4. ฐานข้อมูลรายละเอียดงาน
        const worksData = {
            1: `> STATUS: ACTIVE\n[01]: พัฒนาทักษะการขายและข้อมูลผลิตภัณฑ์สำหรับที่ปรึกษาการขาย และแก้ปัญหาการใช้งานเบื้องต้นของฝ่ายขาย`,
            2: `> STATUS: ACTIVE\n[02]: ค้นหาเทรนด์ใหม่ๆ เพื่อวางแผนการทำกิจกรรมทั้งออนไลน์และออฟไลน์ รวมถึง การทำกราฟิกดีไซน์เพื่อผลิตสื่อให้สอดคล้องกับเป้าหมายองค์กร`,
            3: `> STATUS: ACTIVE\n[03]: แก้ปัญหาระบบการทำงานด้านคอมพิวเตอร์/แอป เบื้องต้น เพื่อทำให้การทำงานของบุคลากรในองค์กรไม่ติดขัด`,
            4: `> STATUS: ACTIVE\n[04]: อัพเดทและจัดสรรข้อมูลการขาย การตอบปัญหา รวมถึงการจัดการและบริหารสต็อกให้เป็นปัจจุบัน`,
            5: `> STATUS: ACTIVE\n[05]: พัฒนาระบบใหม่ๆ ไม่ว่าจะเป็นเว็บไซต์/เว็บแอป/AI รวมถึงรูปแบบระบบการทำงานแบบแมนนวล เพื่อเพิ่มความสะดวกต่อพนักงานและลูกค้า`
        };

        function filterWork(index, element) {
            document.querySelectorAll('.btn-tactical').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            const textPanel = document.getElementById('panel-text');
            textPanel.style.opacity = '0.3';
            
            setTimeout(() => {
                textPanel.innerText = worksData[index];
                textPanel.style.opacity = '1';
            }, 150);
        }

        // 5. ระบบนาฬิกาเรียลไทม์
        function startTacticalClock() {
            const clockEl = document.getElementById('sys-clock');
            function update() {
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                clockEl.innerText = `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
            }
            update();
            setInterval(update, 1000);
        }
        
        // ⚡ เริ่มการทำงานของนาฬิกา และ ตรวจสอบความจำล็อกอินทันทีที่เปิดเว็บ
        window.addEventListener('DOMContentLoaded', () => {
            startTacticalClock();
            checkPersistedLogin(); 
        });


        /* ================= 📱 🦾ระบบปุ่มลอยดึงลากได้ (iPhone AssistiveTouch Logic) ================= */
        const btn = document.getElementById('assistive-btn');
        let isDragging = false;
        let hasMoved = false; 
        let startX, startY, initialX, initialY;

        function dragStart(e) {
            isDragging = true;
            hasMoved = false;
            
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            
            startX = clientX;
            startY = clientY;
            
            const rect = btn.getBoundingClientRect();
            initialX = rect.left;
            initialY = rect.top;
            
            btn.style.transition = 'none'; 
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            
            const dx = clientX - startX;
            const dy = clientY - startY;
            
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                hasMoved = true;
            }
            
            let newX = initialX + dx;
            let newY = initialY + dy;
            
            const maxW = window.innerWidth - btn.offsetWidth;
            const maxH = window.innerHeight - btn.offsetHeight;
            newX = Math.max(0, Math.min(newX, maxW));
            newY = Math.max(0, Math.min(newY, maxH));
            
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
            btn.style.bottom = 'auto';
            btn.style.right = 'auto';
        }

        function dragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            
            if (!hasMoved) {
                toggleModal(true);
            }
        }

        btn.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', dragEnd);

        btn.addEventListener('touchstart', dragStart, { passive: false });
        window.addEventListener('touchmove', drag, { passive: false });
        window.addEventListener('touchend', dragEnd);


        /* ================= 🪟 🔐 ระบบหน้าต่างล็อกอิน และสลับโหมดพรีเมี่ยม ================= */
        const modal = document.getElementById('login-modal');
        const forgotPanel = document.getElementById('forgot-panel');
        const generatedCodeEl = document.getElementById('generated-code');

        function toggleModal(show) {
            if(show) {
                modal.classList.add('open');
            } else {
                modal.classList.remove('open');
                toggleForgotPanel(false); 
            }
        }

        function toggleForgotPanel(show) {
            const oldPassGroup = document.getElementById('old-pass-group');
            const passInput = document.getElementById('login-pass');
            const newPassInput = document.getElementById('new-pass');
            
            if(show) {
                const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                let randomCode = "";
                for (let i = 0; i < 6; i++) {
                    randomCode += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                
                generatedCodeEl.innerText = randomCode;
                forgotPanel.style.display = 'block';
                
                newPassInput.required = true;
                passInput.required = false; 
                oldPassGroup.style.display = 'none'; 
            } else {
                forgotPanel.style.display = 'none';
                newPassInput.required = false;
                newPassInput.value = '';
                passInput.required = true;
                oldPassGroup.style.display = 'block'; 
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const passwordInput = document.getElementById('login-pass').value;
            const newPassword = document.getElementById('new-pass').value;

            // 🔒 1. SECURITY CHECK: อีเมล
            if (email !== 'popsteptep555@gmail.com') {
                alert(`[ ACCESS DENIED ]\nขออภัยค่ะ อีเมลนี้ไม่มีสิทธิ์เข้าถึงระบบในฐานะเจ้าของเว็บไซต์!`);
                return;
            }

            // 🔒 2. PASSWORD CHECK: รหัสผ่าน
            if (forgotPanel.style.display === 'block') {
                if (newPassword.length < 8) {
                    alert(`[ SYSTEM ERROR ]\nกรุณาตั้งรหัสผ่านใหม่ให้ครบ 8 ตัวอักษรค่ะ!`);
                    return;
                }
                currentOwnerPassword = newPassword; 
                // บันทึกรหัสผ่านใหม่ลงหน่วยความจำถาวรทันที
                localStorage.setItem('ownerPassword', currentOwnerPassword);
                alert(`[ SYSTEM UPDATE ]\nเปลี่ยนรหัสผ่านใหม่เรียบร้อยแล้วค่ะ!`);
            } else {
                if (passwordInput !== currentOwnerPassword) {
                    alert(`[ ACCESS DENIED ]\nรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้งค่ะ!`);
                    return;
                }
            }

            // 🎉 เข้าสู่ระบบสำเร็จ -> ทำการบันทึกคีย์ความจำลงบราวเซอร์ถาวร
            alert(`[ ACCESS GRANTED ]\nยินดีต้อนรับกลับค่ะคุณชินอิจิ ระบบเปิดโหมดพรีเมี่ยมเจ้าของเว็บไซต์เรียบร้อยแล้วค่ะ!`);
            
            localStorage.setItem('ownerLoggedIn', 'true'); // สั่งให้จำสถานะว่าล็อกอินแล้ว
            localStorage.setItem('ownerPassword', currentOwnerPassword); // สั่งให้จำรหัสผ่านปัจจุบัน
            
            document.body.classList.add('owner-mode');
            document.getElementById('role-tag').innerText = '[ OWNER / DEVELOPER ]';
            
            toggleModal(false); 
        }

        // 🚨 6. ฟังก์ชันออกจากระบบ (ล้างค่าความจำทั้งหมดออก)
        function handleLogout() {
            if (confirm("[ SYSTEM ALERT ]\nคุณชินอิจิต้องการออกจากระบบโหมดพรีเมี่ยมใช่ไหมคะ?")) {
                
                // 🗑️ ลบสถานะล็อกอินออกจากบราวเซอร์ (กด F5 ถัดจากนี้จะกลับมาหน้าปกติแล้วค่ะ)
                localStorage.removeItem('ownerLoggedIn');
                
                document.body.classList.remove('owner-mode');
                document.getElementById('role-tag').innerText = '[ SUPPORTER ]';
                
                document.getElementById('login-form').reset();
                toggleForgotPanel(false);
                
                alert("[ SYSTEM UPDATE ]\nออกจากระบบเรียบร้อยแล้วค่ะ สลับกลับสู่โหมดมินิมอลปกติ");
            }
        }
    </script>
</body>
</html>
