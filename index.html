<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinichi - Tactical Portfolio Console</title>
    
    <!-- การนำเข้า Fonts สไตล์ Technical & Modern จาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- 🎨 Monochrome Tactical Variables --- */
        :root {
            --bg-base: #0a0a0a;          /* สีดำลึกพื้นหลังหลัก */
            --bg-surface: #121212;       /* สีเทาเข้มสำหรับพื้นผิวการ์ด/คอนโซล */
            --bg-surface-hover: #1a1a1a; /* สีเทาสำหรับเอฟเฟกต์ Hover */
            --border-subtle: #262626;    /* เส้นขอบบางสไตล์มินิมอล */
            --border-active: #ffffff;    /* เส้นสีขาวบริสุทธิ์เมื่อเปิดใช้งาน */
            --text-pure: #ffffff;        /* ข้อความสีขาว */
            --text-muted: #737373;       /* ข้อความสีเทาหม่นสำหรับข้อมูลรอง */
            --text-ghost: #404040;       /* ข้อความเทาเข้มมากสำหรับตกแต่ง */
            
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition-tactical: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- 🌐 Global Reset & Base Layout --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-pure);
            font-family: var(--font-sans);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            /* ลายตารางกริดจำลองระบบควบคุม */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 60px 24px;
            position: relative;
        }

        /* --- 🎭 SPA View Management --- */
        .view-container {
            transition: var(--transition-tactical);
            opacity: 1;
            transform: translateY(0);
        }

        .view-container.hidden {
            display: none;
            opacity: 0;
            transform: translateY(20px);
        }

        /* --- 🦸‍♂️ View 1: Home/Hero Section --- */
        .hero-section {
            position: relative;
            text-align: left;
            padding-bottom: 48px;
            border-bottom: 1px dashed var(--border-subtle);
            margin-bottom: 40px;
        }

        .hero-section::before {
            content: "// SHINICHI_CORE_OS //";
            font-family: var(--font-mono);
            color: var(--text-ghost);
            font-size: 0.8rem;
            position: absolute;
            top: 0; right: 0;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .hero-avatar {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
            padding: 4px;
            background-color: var(--bg-surface);
            object-fit: cover;
        }

        .hero-section h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .hero-section h2 {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* --- 🧩 Reusable Card --- */
        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            padding: 28px;
            margin-bottom: 20px;
            position: relative;
            transition: var(--transition-tactical);
        }

        .card:hover {
            border-color: #333;
            background-color: var(--bg-surface-hover);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '■';
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--text-pure);
            color: var(--bg-base);
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid var(--text-pure);
            cursor: pointer;
            transition: var(--transition-tactical);
        }

        .btn-primary:hover {
            background-color: transparent;
            color: var(--text-pure);
        }

        /* --- 🎛️ View 2: Works Terminal Section --- */
        .works-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px dashed var(--border-subtle);
            margin-bottom: 32px;
        }

        .works-header h2 {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .btn-back {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-subtle);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            transition: var(--transition-tactical);
        }

        .btn-back:hover {
            color: var(--text-pure);
            border-color: var(--border-active);
        }

        /* แผงปุ่มตัวเลือกผลงาน 5 ปุ่ม */
        .tactical-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        @media (min-width: 600px) {
            .tactical-grid {
                grid-template-columns: repeat(2, 1fr); /* แสดงสองคอลัมน์บนจอคอม */
            }
            .full-width-btn {
                grid-column: span 2; /* ปุ่มที่ 5 ให้ขยายเต็มความกว้างเพื่อความสมดุล */
            }
        }

        .btn-tactical {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-pure);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            padding: 20px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            transition: var(--transition-tactical);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .btn-tactical span.num {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .btn-tactical span.label {
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .btn-tactical:hover, .btn-tactical.active {
            border-color: var(--border-active);
            background-color: var(--bg-surface-hover);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.03);
        }

        /* กล่องแสดงเนื้อหาผลงานตามปุ่มที่เลือก */
        .display-panel {
            background-color: #0d0d0d;
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            padding: 24px;
            min-height: 150px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            position: relative;
        }

        .display-panel::before {
            content: "CONSOLE_OUTPUT";
            font-size: 0.7rem;
            color: var(--text-ghost);
            position: absolute;
            top: 8px; right: 12px;
        }

        .panel-content {
            color: var(--text-muted);
            white-space: pre-line; /* รองรับการขึ้นบรรทัดใหม่ตามข้อความ */
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ================= VIEW 1: HOME PANEL ================= -->
        <div id="view-home" class="view-container">
            <header class="hero-section">
                <div class="avatar-wrapper">
                    <img src="my-profile.jpg" alt="Shinichi" class="hero-avatar">
                </div>
                <h1>SHINICHI</h1>
                <h2>[ MARKETING / SUPPORTER ]</h2>
            </header>

            <main class="card">
                <h3 class="card-title">Wellcome to อะไรก็ไม่รู้เว็บไซต์</h3>
                <p>เว็บไซต์นี้จัดทำขึ้นเพื่อประโยชน์ต่อบุคคลที่ผ่านมา และกำลังมองหาสิ่งที่ขาดหาย โดยเว็บนี้ก็ไม่มีอะไรให้หาเช่นเดียวกันครับ</p>
                <!-- ปรับเปลี่ยนฟังก์ชันคลิกเพื่อสลับหน้าจอแทนการเปิด Modal -->
                <button class="btn-primary" onclick="switchView('view-works')">VIEW WORKS</button>
            </main>
        </div>

        <!-- ================= VIEW 2: WORKS TERMINAL (หน้าใหม่ที่สร้างขึ้นตามโจทย์) ================= -->
        <div id="view-works" class="view-container hidden">
            <header class="works-header">
                <h2>// Track Record</h2>
                <button class="btn-back" onclick="switchView('view-home')">[ RETURN ]</button>
            </header>

            <!-- แผงปุ่มตัวเลือก 5 ปุ่มสไตล์ Tactical Console -->
            <section class="tactical-grid">
                <button class="btn-tactical active" onclick="filterWork(1, this)">
                    <span class="num">MG UBONRATCHATHANI // 01</span>
                    <span class="label">MG MASTER</span>
                </button>
                <button class="btn-tactical" onclick="filterWork(2, this)">
                    <span class="num">MG UBONRATCHATHANI // 02</span>
                    <span class="label">MARKETING</span>
                </button>
                <button class="btn-tactical" onclick="filterWork(3, this)">
                    <span class="num">MG UBONRATCHATHANI // 03</span>
                    <span class="label">IT SUPPORT</span>
                </button>
                <button class="btn-tactical" onclick="filterWork(4, this)">
                    <span class="num">MG UBONRATCHATHANI // 04</span>
                    <span class="label">ADMIN / Stock</span>
                </button>
                <button class="btn-tactical full-width-btn" onclick="filterWork(5, this)">
                    <span class="num">MG UBONRATCHATHANI // 05</span>
                    <span class="label">Developer </span>
                </button>
            </section>
                        <section class="display-panel">
                <div id="panel-text" class="panel-content">
                    > กำลังโหลด...
                </div>
            </section>
        </div>

    </div>

    <!-- --- ⚙️ Pure Logic (JavaScript JavaScript) --- -->
    <script>
        // 1. ระบบจัดการเปลี่ยนมุมมองหน้าจอแบบ SPA Smooth Transition
        function switchView(targetViewId) {
            const currentActive = document.querySelector('.view-container:not(.hidden)');
            const targetView = document.getElementById(targetViewId);
            
            if (currentActive) {
                // เอฟเฟกต์ Fade out หน้าจอปัจจุบัน
                currentActive.style.opacity = '0';
                currentActive.style.transform = 'translateY(-10px)';
                
                setTimeout(() => {
                    currentActive.classList.add('hidden');
                    
                    // เตรียมหน้าจอปลายทาง
                    targetView.classList.remove('hidden');
                    targetView.style.opacity = '0';
                    targetView.style.transform = 'translateY(10px)';
                    
                    // เอฟเฟกต์ Fade in หน้าจอใหม่
                    setTimeout(() => {
                        targetView.style.opacity = '1';
                        targetView.style.transform = 'translateY(0)';
                    }, 50);
                }, 300);
            }
        }

        // 2. ฐานข้อมูลจำลองของผลงานทั้ง 5 หมวดหมู่ของคุณชินอิจิ
        const worksData = {
            1: `> STATUS: ACTIVE\n[01]: พัฒนาทักษะการขายและข้อมูลผลิตภัณฑ์สำหรับที่ปรึกษาการขาย และแก้ปัญหาการใช้งานเบื้องต้นของฝ่ายขาย`,
            2: `> STATUS: ACTIVE\n[02]: ค้นหาเทรนด์ใหม่ๆ เพื่อวางแผนการทำกิจกรรมทั้งออนไลน์และออฟไลน์ รวมถึง การทำกราฟิกดีไซน์เพื่อผลิตสื่อให้สอดคล้องกับเป้าหมายองค์กร`,
            3: `> STATUS: ACTIVE\n[03]: แก้ปัญหาระบบการทำงานด้านคอมพิวเตอร์/แอป เบื้องต้น เพื่อทำให้การทำงานของบุคลากรในองค์กรไม่ติดขัด`,
            4: `> STATUS: ACTIVE\n[04]: อัพเดทและจัดสรรข้อมูลการขาย การตอบปัญหา รวมถึงการจัดการและบริหารสต็อกให้เป็นปัจจุบัน`,
            5: `> STATUS: ACTIVE\n[05]: พัฒนาระบบใหม่ๆ ไม่ว่าจะเป็นเว็บไซต์/เว็บแอป รูปแบบระบบการทำงานแบบแมนนวล เพื่อเพิ่มความสะดวกต่อพนักงานและลูกค้า`
        };

        // 3. ฟังก์ชันคลิกเลือกหมวดหมู่เพื่อเปลี่ยนข้อความในแผงคอนโซล
        function filterWork(index, element) {
            // ลบสถานะความเคลื่อนไหว (Active) จากปุ่มอื่นทั้งหมด
            document.querySelectorAll('.btn-tactical').forEach(btn => btn.classList.remove('active'));
            // เพิ่มสถานะ Active ให้กับปุ่มที่คุณชินอิจิเลือก
            element.classList.add('active');
            
            // เปลี่ยนข้อความบนแผงควบคุมตาม ID
            const textPanel = document.getElementById('panel-text');
            textPanel.style.opacity = '0.3'; // เฟดจางลงชั่วคราวขณะเปลี่ยนข้อความเพื่อให้ดูมีลูกเล่น
            
            setTimeout(() => {
                textPanel.innerText = worksData[index];
                textPanel.style.opacity = '1';
            }, 150);
        }
    </script>
</body>
</html>
